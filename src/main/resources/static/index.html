<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Planner</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="/img/2792961.ico" type="image/x-icon">
</head>

<body>

    <h1>Planejador de Casamento</h1>

    <div id="exchangeRate">
        €1 = R$ 6,40
    </div>

    <div class="planning-section">

        <input type="number" id="targetBudget" placeholder="Meta do Casamento">

        <input type="number" id="currentSavings" placeholder="Valor já guardado">

        <input type="number" id="monthlySaving" placeholder="Quanto conseguem guardar por mês">
        <select id="currency">

            <option value="BRL">
                Real (R$)
            </option>

            <option value="EUR">
                Euro (€)
            </option>

        </select>

        <input type="date" id="weddingDate">

        <button type="button" id="savePlan">
            Salvar Planejamento
        </button>

    </div>

<!--
    <button id="showCategoryForm">
        Nova Categoria
    </button>

    <form id="categoryForm" style="display:none">

        <input
                type="text"
                id="categoryName"
                placeholder="Nome da categoria"
        >

        <input
                type="number"
                id="categoryBudget"
                placeholder="Orçamento"
        >

        <button id="saveCategory">
            Salvar Categoria
        </button>
    </form>
-->

    <hr>
    <div class="dashboard">

        <div class="metric">
            <h3>Falta</h3>
            <p id="falta">R$ 30000</p>
        </div>

        <div class="metric">

            <h3>Valor Guardado</h3>

            <p id="currentSavingsValue">
                R$ 0
            </p>

        </div>

        <div class="metric">

            <h3>Margem Mensal</h3>

            <p id="goalStatus">
                -
            </p>

        </div>

        <div class="metric">
            <h3>Meta Casamento</h3>
            <p id="metaCasamento">R$ 30000</p>
        </div>



        <div class="metric">
            <h3>Total Gasto</h3>
            <p id="totalGasto">R$ 0</p>
        </div>


    </div>
    <h2>
        Fornecedores
    </h2>

    <div id="vendors"></div>

    <button
            type="button"
            id="showVendorForm">
        Novo Fornecedor
    </button>

    <button
            type="button"
            id="toggleExpenses">

        Mostrar Despesas Extras

    </button>

    <button id="exportPdf">
        Exportar PDF
    </button>

    <form id="vendorForm" style="display:none">

        <input
                id="vendorName"
                placeholder="Fornecedor"
        >

        <input
                id="vendorCategory"
                placeholder="Categoria"
        >

        <input
                type="number"
                id="totalAmount"
                placeholder="Valor Total"
        >

        <input
                type="number"
                id="paidAmount"
                placeholder="Valor Pago"
        >

        <button
                type="submit">
            Salvar Fornecedor
        </button>

    </form>

    <hr>

    <!-- Despesas Extras -->
    <div
            id="expensesSection"
            style="display:none">
        <form id="expenseForm">

            <input type="text" id="description" placeholder="Descrição" required>

            <input type="text" id="category" placeholder="Categoria" required>

            <input type="number" id="value" placeholder="Valor" required>

            <input type="date" id="expenseDate" required>

            <button type="submit">
                Adicionar
            </button>
        </form>

        <div class="chart-container">

            <h2 id="total">
                Total: R$ 0
            </h2>

            <div class="filters">

                <input
                        type="text"
                        id="searchInput"
                        placeholder="Buscar despesa"
                >

                <select id="categoryFilter">

                    <option value="">
                        Todas categorias
                    </option>

                </select>

            </div>

            <div id="expenses"></div>

        </div>

    </div>

    <div class="progress-container">

        <div class="progress-info">
            <span>Progresso do orçamento</span>
            <span id="percentual">0%</span>
        </div>
        <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
        </div>

    </div>



    <button id="toggleChart">
        Ver Gráfico
    </button>

    <div class="chart-container" id="chartContainer"
        <canvas id="categoryChart"></canvas>
    </div>

    <hr>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/charts.js"></script>
    <!-- <script src="js/category-form.js"></script> -->
    <script src="js/expenses.js"></script>
    <script src="js/vendor.js"></script>
    <script src="js/pdf.js"></script>
    <script src="js/category-budgets.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
